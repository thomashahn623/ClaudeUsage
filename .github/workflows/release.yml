name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Build .app bundle
        run: ./build-app.sh

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Zip .app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ClaudeStatus.app ClaudeStatus-${{ steps.version.outputs.version }}.zip
          shasum -a 256 ClaudeStatus-${{ steps.version.outputs.version }}.zip > ClaudeStatus-${{ steps.version.outputs.version }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ClaudeStatus-${{ steps.version.outputs.version }}
          path: |
            build/ClaudeStatus-${{ steps.version.outputs.version }}.zip
            build/ClaudeStatus-${{ steps.version.outputs.version }}.zip.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: ClaudeStatus ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/ClaudeStatus-${{ steps.version.outputs.version }}.zip
            build/ClaudeStatus-${{ steps.version.outputs.version }}.zip.sha256
