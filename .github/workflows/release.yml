name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Build .app bundle
        run: ./build-app.sh

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Zip .app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent AIUsage.app AIUsage-${{ steps.version.outputs.version }}.zip
          shasum -a 256 AIUsage-${{ steps.version.outputs.version }}.zip > AIUsage-${{ steps.version.outputs.version }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: AIUsage-${{ steps.version.outputs.version }}
          path: |
            build/AIUsage-${{ steps.version.outputs.version }}.zip
            build/AIUsage-${{ steps.version.outputs.version }}.zip.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: AI Usage ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/AIUsage-${{ steps.version.outputs.version }}.zip
            build/AIUsage-${{ steps.version.outputs.version }}.zip.sha256
